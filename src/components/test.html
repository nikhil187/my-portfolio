<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .profile-image-container {
            text-align: center;
        }
        .profile-image {
            width: 200px; /* Adjust size as needed */
            height: 200px; /* Adjust size as needed */
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ddd;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="profile-image-container">
        <h1>Profile Image Test</h1>
        <img 
            src="https://www.google.com/imgres?q=flower%20profile%20picture&imgurl=https%3A%2F%2Fimages.unsplash.com%2Fphoto-1491918434088-6a06cd4254ef%3Ffm%3Djpg%26q%3D60%26w%3D3000%26ixlib%3Drb-4.0.3%26ixid%3DM3wxMjA3fDB8MHxzZWFyY2h8Mnx8YWVzdGhldGljJTIwZmxvd2VyfGVufDB8fDB8fHww&imgrefurl=https%3A%2F%2Funsplash.com%2Fs%2Fphotos%2Faesthetic-flower&docid=mEF8TRLP94QARM&tbnid=3ervWfYjVKmROM&vet=12ahUKEwiS8JWh1eCLAxVdMlkFHSMdH94QM3oECEwQAA..i&w=3000&h=4588&hcb=2&ved=2ahUKEwiS8JWh1eCLAxVdMlkFHSMdH94QM3oECEwQAA"

        />
    </div>
</body>
</html>
